<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate of Completion — SkillTrack</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght=0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500;1,9..144,600&family=Inter:wght=400;500;600;700&display=swap');

  :root {
    --ink: #10192B;
    --ink-deep: #0A121C;
    --parchment: #F7F2E7;
    --parchment-deep: #EFE6D3;
    --gold: #B8893E;
    --gold-soft: #D9B97C;
    --gold-line: rgba(184,137,62,0.55);
    --charcoal: #2A2620;
    --line: rgba(16,25,43,0.14);
    --display: 'Fraunces', serif;
    --body: 'Inter', sans-serif;
    --radius: 2px;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #E7E0CC;
    color: var(--charcoal);
    font-family: var(--body);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .wrap { max-width: 1040px; width: 100%; padding: 0 24px; }

  .site-header { width: 100%; background: rgba(247,242,231,0.92); border-bottom: 1px solid var(--line); }
  .site-header .wrap { display: flex; align-items: center; justify-content: space-between; height: 84px; }
  .brand { font-family: var(--display); font-weight: 600; font-size: 1.3rem; color: var(--ink); text-decoration: none; }
  .header-nav a { font-size: 0.85rem; font-weight: 600; color: var(--ink); text-decoration: none; opacity: 0.7; }

  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 11px 22px; border-radius: var(--radius); font-weight: 600; font-size: 0.85rem; cursor: pointer; border: 1px solid transparent; text-decoration: none; font-family: var(--body); }
  .btn-primary { background: var(--ink); color: var(--parchment); }
  .btn-primary:hover { background: var(--ink-deep); }
  .btn-ghost { background: transparent; border-color: var(--ink); color: var(--ink); }
  .btn-ghost:hover { background: var(--ink); color: var(--parchment); }

  .stage { padding: 56px 0 90px; display: flex; flex-direction: column; align-items: center; width: 100%; }
  .stage-actions { display: flex; gap: 12px; margin-bottom: 34px; }

  /* ===================== CERTIFICATE ===================== */
  .certificate {
    position: relative;
    width: 100%;
    max-width: 980px;
    aspect-ratio: 1.42 / 1;
    background: var(--parchment);
    box-shadow: 0 30px 70px rgba(16,25,43,0.28), 0 4px 14px rgba(16,25,43,0.12);
    padding: 26px;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(184,137,62,0.05), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(184,137,62,0.05), transparent 40%);
  }

  .cert-border-outer { position: absolute; inset: 20px; border: 2px solid var(--ink); }
  .cert-border-middle { position: absolute; inset: 26px; border: 1px solid var(--gold-soft); }
  .cert-border-inner { position: absolute; inset: 34px; border: 1px dashed var(--gold-line); }

  .flourish { position: absolute; width: 64px; height: 64px; }
  .flourish.tl { top: 34px; left: 34px; }
  .flourish.tr { top: 34px; right: 34px; transform: scaleX(-1); }
  .flourish.bl { bottom: 34px; left: 34px; transform: scaleY(-1); }
  .flourish.br { bottom: 34px; right: 34px; transform: scale(-1,-1); }

  .cert-watermark {
    position: absolute; top: 52%; left: 50%; width: 42%; transform: translate(-50%,-50%);
    opacity: 0.04; pointer-events: none;
  }
  .cert-watermark .mark-ink { fill: var(--ink); }
  .cert-watermark .mark-gold { fill: var(--gold); }
  .cert-watermark .mark-gold-line { stroke: var(--gold); stroke-width: 1.5; fill: none; }
  .cert-watermark .mark-gold-fill { fill: var(--gold); }

  .cert-inner {
    position: relative; height: 100%; display: flex; flex-direction: column; align-items: center;
    justify-content: flex-start; padding: 42px 70px 30px; text-align: center;
  }

  .crest { width: 84px; height: 84px; margin-bottom: 8px; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .crest circle:nth-child(1) { stroke: var(--ink); stroke-width: 1.5; }
  .crest circle:nth-child(2) { stroke: var(--gold); stroke-width: 1; }
  .crest path { stroke: var(--ink); stroke-width: 1.5; fill: rgba(184,137,62,0.08); }
  .crest line { stroke: var(--gold); stroke-width: 1.5; }

  .cert-eyebrow { font-size: 0.72rem; letter-spacing: 0.32em; text-transform: uppercase; color: var(--gold); font-weight: 600; margin: 6px 0 18px; }
  .cert-lede { font-family: var(--display); font-style: italic; font-size: 1.02rem; color: var(--charcoal); opacity: 0.75; margin: 0 0 10px; }

  .cert-name-wrap { margin-bottom: 6px; }
  .cert-name { font-family: var(--display); font-weight: 600; font-size: 2.6rem; color: var(--ink); line-height: 1.1; padding: 0 4px; display: inline-block; min-width: 260px; }
  .cert-name[contenteditable="true"] { outline: none; border-bottom: 1px dashed var(--gold-soft); cursor: text; }
  .cert-underline { width: 300px; max-width: 70%; height: 10px; margin: 6px auto 22px; }

  .cert-body-text { font-size: 0.95rem; line-height: 1.7; color: var(--charcoal); max-width: 62ch; margin: 0 0 6px; }
  .cert-course-title { font-family: var(--display); font-weight: 500; font-size: 1.5rem; color: var(--ink); margin: 6px 0 2px; }
  .cert-course-code { font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.55; margin: 0 0 22px; }

  .cert-meta-row { display: flex; gap: 46px; margin: 8px 0 30px; flex-wrap: wrap; justify-content: center; }
  .cert-meta-item { text-align: center; }
  .cert-meta-label { font-size: 0.66rem; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.55; margin-bottom: 4px; }
  .cert-meta-value { font-size: 0.88rem; font-weight: 600; color: var(--ink); }

  .cert-sign-row { display: flex; justify-content: center; gap: 90px; margin-top: auto; width: 100%; }
  .cert-sign { text-align: center; }
  .cert-sign-name { font-family: var(--display); font-style: italic; font-size: 1.35rem; color: var(--ink); margin-bottom: 4px; }
  .cert-sign-line { width: 170px; border-top: 1px solid var(--ink); margin: 0 auto 6px; }
  .cert-sign-role { font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.6; }

  /* ===================== LOCKED STATE ===================== */
  .locked-card { max-width: 560px; width: 100%; background: white; border: 1px solid var(--line); border-radius: var(--radius); padding: 46px 40px; text-align: center; }
  .locked-card .glyph { font-size: 2rem; margin-bottom: 14px; opacity: 0.6; }
  .locked-card h2 { font-family: var(--display); font-weight: 500; color: var(--ink); margin: 0 0 10px; font-size: 1.5rem; }
  .locked-card p { opacity: 0.7; font-size: 0.94rem; line-height: 1.6; margin: 0 0 20px; }
  .locked-progress-bg { width: 100%; height: 8px; background: rgba(16,25,43,0.08); border-radius: 4px; overflow: hidden; margin-bottom: 24px; }
  .locked-progress-fill { height: 100%; background: var(--gold); }

  .site-footer { border-top: 1px solid var(--line); padding: 44px 0; margin-top: auto; font-size: 0.8rem; opacity: 0.5; width: 100%; }
  .site-footer .wrap { text-align: center; }

  /* ===================== PRINT ===================== */
  @media print {
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    @page { size: landscape; margin: 0; }
    body { background: white; }
    .site-header, .site-footer, .stage-actions { display: none !important; }
    .stage { padding: 0; }
    .certificate { box-shadow: none; max-width: 100%; width: 100vw; height: 100vh; aspect-ratio: unset; inset: 0 !important; padding: 20px; }
    .cert-border-outer { inset: 10px; }
    .cert-border-middle { inset: 16px; }
    .cert-border-inner { inset: 24px; }
  }
</style>
</head>
<body>

  <header class="site-header">
    <div class="wrap">
      <a href="student-dashboard.html" class="brand">SkillTrack Portal</a>
      <nav class="header-nav"><a href="student-dashboard.html">My Dashboard</a></nav>
    </div>
  </header>

  <main class="stage" id="stage-root">
    <!-- View states render inside here -->
  </main>

  <footer class="site-footer"><div class="wrap">© 2026 Student Learning Environment Management Layer.</div></footer>

  <script>
    const KNOWN_COURSE_TITLES = {
      "CS-101": "Foundations of Programming",
      "CS-204": "Introduction to Computer Vision",
      "CS-309": "Autonomous Robotics Fundamentals",
      "CS-401": "Generative AI & Prompt Engineering",
      "CS-403": "Agentic AI Systems & Autonomous Frameworks"
    };

    function getCourseInfo(courseId) {
      const globalCourses = JSON.parse(localStorage.getItem("globalCourses")) || [];
      const custom = globalCourses.find(c => c.id === courseId);
      return {
        title: (custom && custom.title) || KNOWN_COURSE_TITLES[courseId] || courseId,
        totalModules: custom && custom.tasks ? custom.tasks.length : null
      };
    }

    function getCompletionPercent(studentId, courseId) {
      const stats = JSON.parse(localStorage.getItem("studentProgressStats")) || {};
      return (stats[studentId] && stats[studentId][courseId]) || 0;
    }

    function getCompletedModuleCount(studentId, courseId) {
      const checklist = JSON.parse(localStorage.getItem(`checklist_${studentId}_${courseId}`)) || [];
      return checklist.length;
    }

    function makeCertificateId(studentId, courseId) {
      const raw = `${studentId}::${courseId}::skilltrack`;
      let hash = 0;
      for (let i = 0; i < raw.length; i++) {
        hash = (hash * 31 + raw.charCodeAt(i)) >>> 0;
      }
      return "SKT-" + hash.toString(36).toUpperCase();
    }

    function formatDate(date) {
      return date.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
    }

    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const courseId = urlParams.get('id') || "CS-101";
      
      let studentId = localStorage.getItem("studentAcademicId") || "default";
      const percent = getCompletionPercent(studentId, courseId);
      const courseInfo = getCourseInfo(courseId);

      if (percent >= 100) {
        renderCertificate(courseId, courseInfo, studentId);
      } else {
        renderLockedState(courseId, courseInfo, percent);
      }
    });

    function renderLockedState(courseId, courseInfo, percent) {
      document.getElementById('stage-root').innerHTML = `
        <div class="locked-card">
          <div class="glyph">🔒</div>
          <h2>Certificate not yet unlocked</h2>
          <p>You're <strong>${percent}%</strong> through <strong>${courseInfo.title}</strong>. Finish every module to unlock your certificate of completion.</p>
          <div class="locked-progress-bg"><div class="locked-progress-fill" style="width:${percent}%;"></div></div>
          <a class="btn btn-primary" href="course-content.html?id=${courseId}">Resume course</a>
        </div>
      `;
    }

    function renderCertificate(courseId, courseInfo, studentId) {
      let studentName = localStorage.getItem("student_backup_name") || "";
      
      const completedCount = getCompletedModuleCount(studentId, courseId);
      const certId = makeCertificateId(studentId, courseId);
      const dateStr = formatDate(new Date());

      document.getElementById('stage-root').innerHTML = `
        <div class="stage-actions">
          <button class="btn btn-primary" onclick="window.print()">Download / Print Certificate</button>
          <a class="btn btn-ghost" href="course-content.html?id=${courseId}">Back to course</a>
        </div>

        <div class="certificate" id="certificate-card">
          ${studentWatermarkSVG()}
          
          <div class="cert-border-outer"></div>
          <div class="cert-border-middle"></div>
          <div class="cert-border-inner"></div>
          
          ${flourishSVG('tl')}${flourishSVG('tr')}${flourishSVG('bl')}${flourishSVG('br')}

          <div class="cert-inner">
            ${crestSymbolSVG()}
            
            <div class="cert-eyebrow">Certificate of Completion</div>
            <div class="cert-lede">This certifies that</div>

            <div class="cert-name-wrap">
              <span class="cert-name" id="student-name-field" contenteditable="${studentName ? 'false' : 'true'}"
                    onblur="saveStudentName(this)">${studentName || "Click to enter your name"}</span>
            </div>
            ${underlineSVG()}

            <p class="cert-body-text">has successfully completed all requirements of the course</p>
            <div class="cert-course-title">${courseInfo.title}</div>
            <div class="cert-course-code">Course ${courseId}${courseInfo.totalModules ? ` · ${completedCount} of ${courseInfo.totalModules} modules` : ''}</div>

            <div class="cert-meta-row">
              <div class="cert-meta-item">
                <div class="cert-meta-label">Date Completed</div>
                <div class="cert-meta-value">${dateStr}</div>
              </div>
              <div class="cert-meta-item">
                <div class="cert-meta-label">Certificate ID</div>
                <div class="cert-meta-value">${certId}</div>
              </div>
              <div class="cert-meta-item">
                <div class="cert-meta-label">Issued By</div>
                <div class="cert-meta-value">SkillTrack Portal</div>
              </div>
            </div>

            <div class="cert-sign-row">
              <div class="cert-sign">
                <div class="cert-sign-name">A. Whitfield</div>
                <div class="cert-sign-line"></div>
                <div class="cert-sign-role">Program Director</div>
              </div>
              <div class="cert-sign">
                <div class="cert-sign-name">R. Okafor</div>
                <div class="cert-sign-line"></div>
                <div class="cert-sign-role">Dean of Academics</div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function saveStudentName(el) {
      const name = el.innerText.trim();
      if (!name || name === "Click to enter your name") return;
      
      localStorage.setItem("student_backup_name", name);
      el.setAttribute('contenteditable', 'false');
    }

    function crestSymbolSVG() {
      return `
      <svg class="crest" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="21"></circle>
        <circle cx="24" cy="24" r="16"></circle>
        <path d="M24 13 L29 22 L24 31 L19 22 Z"></path>
        <line x1="24" y1="31" x2="24" y2="37"></line>
        <line x1="20" y1="37" x2="28" y2="37"></line>
      </svg>`;
    }

    function studentWatermarkSVG() {
      return `
      <svg class="cert-watermark" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <path class="mark-ink" d="M32 36c-12 0-20 7-20 16v6h40v-6c0-9-8-16-20-16z"></path>
        <circle class="mark-ink" cx="32" cy="20" r="11"></circle>
        <path class="mark-gold" d="M32 4 L54 12 L32 20 L10 12 Z"></path>
        <path class="mark-gold" d="M18 14.5 V23 c0 3.5 6.5 6.5 14 6.5 s14 -3 14 -6.5 V14.5 L32 19.5 Z"></path>
        <line class="mark-gold-line" x1="54" y1="12" x2="54" y2="24"></line>
        <circle class="mark-gold-fill" cx="54" cy="26" r="1.6"></circle>
      </svg>`;
    }

    function underlineSVG() {
      return `
      <svg class="cert-underline" viewBox="0 0 300 10" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 5 C 60 -2, 100 12, 150 5 C 200 -2, 240 12, 298 5" fill="none" stroke="var(--gold)" stroke-width="1.4"/>
      </svg>`;
    }

    function flourishSVG(pos) {
      return `
      <svg class="flourish ${pos}" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      </svg>`;
    }
  </script>
</body>
</html>
