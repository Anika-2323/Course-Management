<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enrollment Confirmed — SkillTrack</title>
  <style>
    /* ============================================================
       Student Course Management — Design Tokens
       Palette : Ink #10192B · Parchment #F7F2E7 · Gold #B8893E
                 Charcoal #2A2620 · Line rgba(16,25,43,0.14)
       Type    : "Fraunces" (display) · "Inter" (body/UI)
       ============================================================ */
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --ink: #10192B;
      --ink-soft: #1C2A42;
      --parchment: #F7F2E7;
      --gold: #B8893E;
      --gold-soft: #D9B97C;
      --charcoal: #2A2620;
      --line: rgba(16,25,43,0.14);
      --display: 'Fraunces', serif;
      --body: 'Inter', sans-serif;
      --radius: 2px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--parchment);
      color: var(--charcoal);
      font-family: var(--body);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    a { color: inherit; text-decoration: none; }

    .success-container {
      max-width: 520px;
      width: 90%;
      text-align: center;
      background: rgba(255, 255, 255, 0.35);
      border: 1px solid var(--line);
      border-top: 4px solid var(--gold);
      padding: 56px 40px;
      border-radius: var(--radius);
      box-shadow: 0 12px 32px rgba(16, 25, 43, 0.04);
    }

    /* ---------- Crest Signature Style ---------- */
    .success-crest {
      width: 64px;
      height: 64px;
      margin: 0 auto 28px;
      color: var(--gold);
    }
    .success-crest circle, .success-crest path, .success-crest line {
      stroke: currentColor;
      fill: none;
      stroke-width: 1.2;
    }
    .success-crest .crest-fill { fill: currentColor; stroke: none; }

    .section-eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 12px;
    }

    h1 {
      font-family: var(--display);
      font-size: 2.4rem;
      font-weight: 500;
      color: var(--ink);
      margin: 0 0 16px 0;
      line-height: 1.2;
    }

    p {
      font-size: 0.98rem;
      opacity: 0.8;
      margin: 0 0 36px 0;
      text-wrap: balance;
    }

    /* ---------- Action Row Array ---------- */
    .actions-stack {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--body);
      font-weight: 600;
      font-size: 0.9rem;
      padding: 14px 28px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    
    .btn-primary {
      background: var(--ink);
      color: var(--parchment);
    }
    .btn-primary:hover { background: var(--ink-soft); }
    
    .btn-ghost {
      background: transparent;
      border-color: var(--ink);
      color: var(--ink);
    }
    .btn-ghost:hover { background: var(--ink); color: var(--parchment); }

    .footer-stamp {
      margin-top: 40px;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.4;
    }
  </style>
</head>
<body>

  <div class="success-container">
    
    <!-- Verified Institutional Seal Logo Mark -->
    <svg class="success-crest" viewBox="0 0 48 48">
      <circle cx="24" cy="24" r="21"></circle>
      <circle cx="24" cy="24" r="16"></circle>
      <path d="M24 13 L29 22 L24 31 L19 22 Z"></path>
      <line x1="24" y1="31" x2="24" y2="37"></line>
      <line x1="20" y1="37" x2="28" y2="37"></line>
    </svg>

    <div class="section-eyebrow">Registry Complete</div>
    <h1>Seat Allocated Successfully</h1>
    <p>Your academic profile matrix hash has been securely verified. The requested module allocation configuration is now active on your curriculum timeline map.</p>

    <div class="actions-stack">
      <a href="#" id="start-learning-btn" class="btn btn-primary">Start Learning</a>
      <a href="student-dashboard.html" class="btn btn-ghost">Go to Student Dashboard</a>
    </div>

    <div class="footer-stamp">SkillTrack Ledger Authority</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
