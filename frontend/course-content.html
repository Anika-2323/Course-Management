<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classroom Hub — SkillTrack</title>
  <link rel="stylesheet" href="css/style.css">

</head>
<body>

  <header class="site-header">
    <div class="wrap">
      <a href="courses.html" class="brand">SkillTrack Portal</a>
      <a href="student-dashboard.html" class="btn btn-ghost">My Dashboard</a>
    </div>
  </header>

 <!-- Centered and Balanced Classroom Workspace -->
  <main class="wrap classroom-container" style="max-width: 1200px; margin: 0 auto; padding: 40px 20px 80px;">
    
    <!-- Course Header: Centered & Simplified -->
    <div style="margin-bottom: 40px; border-bottom: 1px solid var(--line); padding-bottom: 24px;">
      <div class="section-eyebrow" id="course-code-meta" style="color: var(--gold); font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em;">Loading...</div>
      <h1 id="course-title-display" style="font-family: var(--display); color: var(--ink); font-size: 2.5rem; margin: 8px 0 12px 0; font-weight: 500;">Classroom Framework</h1>
      <p id="course-desc-display" style="margin: 0; opacity: 0.75; font-size: 1rem; line-height: 1.6; max-width: 85ch;"></p>
    </div>

    <!-- Balanced Two-Column Main Grid -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start;">
      
      <!-- LEFT COLUMN: Syllabus Core Modules & Progress -->
      <div>
        <section class="progress-panel" style="background: rgba(255,255,255,0.5); border: 1px solid var(--line); padding: 20px; border-radius: var(--radius); margin-bottom: 30px;">
          <div class="progress-meta" style="display: flex; justify-content: space-between; font-size: 0.88rem; font-weight: 600; margin-bottom: 8px;">
            <span>Your Progress</span>
            <span id="progress-percentage-label" style="color: var(--gold);">0% Complete</span>
          </div>
          <div class="progress-bar-bg" style="width: 100%; height: 8px; background: rgba(16,25,43,0.06); border-radius: 4px; overflow: hidden;">
            <div class="progress-bar-fill" id="progress-bar-fill" style="width: 0%; height: 100%; background: var(--ink); transition: width 0.4s ease;"></div>
          </div>
        </section>

        <h3 style="font-family: var(--display); font-size: 1.6rem; margin: 0 0 20px 0; font-weight: 500; color: var(--ink);">Syllabus Core Milestones</h3>
        <div class="modules-stack" id="modules-root" style="display: flex; flex-direction: column; gap: 14px;">
          <!-- Interactive Checkboxes Inject Here -->
        </div>
      </div>

      <!-- RIGHT COLUMN: Centered & Balanced Step-by-Step Lesson Workspace -->
<div style="background: rgba(255, 255, 255, 0.4); border: 1px solid var(--line); padding: 35px; border-radius: var(--radius); display: flex; flex-direction: column; height: 680px;">
  
  <!-- Right Column Tab Switching Controls -->
  <div style="display: flex; gap: 20px; border-bottom: 1px solid var(--line); margin-bottom: 24px; flex-shrink: 0;">
    <button onclick="switchLMSTab('reading')" class="tab-btn" id="tab-reading" style="font-family: var(--body); font-weight: 600; font-size: 0.9rem; padding: 8px 0 12px; background: transparent; border: none; border-bottom: 2px solid var(--ink); cursor: pointer; color: var(--ink);">
      Course Handbook Text
    </button>
    <button onclick="switchLMSTab('materials')" class="tab-btn" id="tab-materials" style="font-family: var(--body); font-weight: 600; font-size: 0.9rem; padding: 8px 0 12px; background: transparent; border: none; cursor: pointer; color: var(--ink); opacity: 0.5;">
      Study Materials
    </button>
  </div>

  <!-- RIGHT PANEL 1: SCROLLABLE HANDBOOK TEXT COMPONENT -->
  <div id="panel-reading" class="lms-panel" style="display: flex; flex-direction: column; flex-grow: 1; overflow: hidden;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
      <h4 id="reading-article-title" style="font-family: var(--display); font-size: 1.4rem; margin: 0; color: var(--ink); font-weight: 500;">Lesson Article</h4>
      <span id="module-step-counter" style="font-size: 0.82rem; font-weight: 600; background: rgba(16,25,43,0.06); padding: 4px 10px; border-radius: 20px;">Module 1 of 4</span>
    </div>
    
    <!-- Clean, scrollable study interface frame box -->
    <div id="reading-scroll-box" style="flex-grow: 1; overflow-y: auto; background: rgba(255,255,255,0.6); border: 1px solid var(--line); border-radius: var(--radius); padding: 24px; line-height: 1.7; font-size: 0.98rem; color: var(--charcoal); margin-bottom: 20px;">
      <div id="reading-article-body">
        <!-- Structured handbook textbook chapters print dynamically directly inside here -->
      </div>
      
      <!-- Hidden marker at the absolute bottom of the text to catch scroll completions -->
      <div id="reading-bottom-marker" style="height: 2px; margin-top: 20px;"></div>
    </div>

    <!-- NEW: Dynamic Navigation & Auto-Complete Control Center -->
    <div id="lesson-action-bar" style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--line); padding-top: 16px; flex-shrink: 0;">
      <span id="scroll-instruction-note" style="font-size: 0.88rem; font-weight: 500; color: var(--gold); transition: opacity 0.2s;">📜 Scroll to the bottom to unlock the next lesson...</span>
      <button id="next-module-btn" disabled onclick="navigateToNextLessonModule()" style="font-family: var(--body); font-weight: 600; font-size: 0.85rem; padding: 12px 24px; background: var(--ink); color: #fff; border: none; border-radius: var(--radius); cursor: not-allowed; opacity: 0.4; transition: all 0.2s ease;">
        Complete & Proceed →
      </button>
    </div>
  </div>

  <!-- RIGHT PANEL 2: MATERIALS DOWNLOAD LIST COMPONENT -->
  <div id="panel-materials" class="lms-panel" style="display: none; overflow-y: auto; flex-grow: 1;">
    <div id="materials-list-root" style="display: flex; flex-direction: column; gap: 12px;">
      <!-- Download items print here -->
    </div>
  </div>

</div>
    </div>
  </main>

  <footer class="site-footer"><div class="wrap">© 2026 Student Learning Environment Management Layer.</div></footer>

 <script src="script.js"></script>
</body></html>
